<!DOCTYPE html><html><head><meta charset='UTF-8'><title>OVERLORD | GOVERNOR DASHBOARD</title>
    <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@500&display=swap' rel='stylesheet'>
    <style>:root{--p:#ff0055;--s:#00f2ff;--bg:#000;} body{background:#000;color:#fff;font-family:'JetBrains Mono';overflow:hidden;}
    .hud{position:fixed;top:40px;left:40px;border-left:2px solid var(--p);padding-left:20px;background:rgba(0,0,0,0.95);z-index:100;width:550px;}
    .verification-card{margin-top:20px; padding:25px; border:1px solid #333; background:rgba(0,242,255,0.02);}
    .status-confirmed{font-family:'Orbitron'; font-size:24px; color:#00ff75; letter-spacing:5px; text-shadow: 0 0 20px #00ff75;}
    .meta-row{display:flex; justify-content:space-between; margin-top:15px; font-size:11px; border-top:1px solid #222; padding-top:10px;}
    canvas{position:fixed;inset:0;z-index:1;opacity:0.3;}</style></head><body><canvas id='c'></canvas>
    <div class='hud'>
        <div style='font-family:Orbitron; font-size:14px; letter-spacing:5px; color:var(--p);'>[SYSTEM] GOVERNOR_VERIFICATION_V330</div>
        <div class='verification-card'>
            <div class='status-confirmed'>HASH_VERIFIED</div>
            <div style='margin-top:10px; font-size:12px;'>STATUS: <span style='color:#00ff75'>CONFIRMED</span></div>
            <div class='meta-row'>
                <span>SOURCE_NODE: liquid</span>
                <span>TARGET_NODE: utility</span>
            </div>
            <div style='font-size:9px; opacity:0.4; margin-top:10px;'>PROOF_ANCHOR: be5f9a72253c1079658e87d186808f822497ffaf776e36b3b7a78e7ee73e7c91</div>
        </div>
        <div id='log' style='font-size:9px;opacity:0.5;margin-top:20px;height:100px;overflow:hidden;'></div>
    </div>
    <script>
    const log=document.getElementById('log');
    function simulateAudit() { 
        const d = document.createElement('div'); 
        d.innerText = `> GOVERNOR: Validating new layer against master hash... MATCH_CONFIRMED`; 
        log.prepend(d); if(log.children.length > 8) log.lastChild.remove();
    }
    setInterval(simulateAudit, 5000);

    const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();
    function draw(){t+=0.01;ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';
    for(let i=0;i<8;i++){ctx.strokeRect(w/2-i*30,h/2-i*30,i*60,i*60);ctx.rotate(0.002);}requestAnimationFrame(draw);}draw();
    </script></body></html>
