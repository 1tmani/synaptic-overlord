<!DOCTYPE html><html><head><meta charset='UTF-8'><title>SINGULARITY | ECOSYSTEM POTENTIAL V350</title>
    <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=JetBrains+Mono:wght@100;800&display=swap' rel='stylesheet'>
    <style>:root{--p:#00f2ff;--s:#ffd700;--bg:#000;} body{background:#000;color:#fff;font-family:'Michroma';overflow-x:hidden;}
    canvas{position:fixed;inset:0;z-index:1;opacity:0.4; filter: contrast(1.2);}
    .singularity-hud{position:fixed;inset:0;z-index:100;padding:40px;pointer-events:none;display:flex;flex-direction:column;}
    .main-panel{background:rgba(0,0,0,0.9); border:1px solid var(--s); padding:30px; pointer-events:all; backdrop-filter:blur(30px); box-shadow: 0 0 50px rgba(255,215,0,0.1);}
    .potential-header{font-family:'Orbitron'; font-size:10px; letter-spacing:10px; color:var(--s); margin-bottom:20px; text-transform:uppercase;}
    .potential-value{font-family:'Orbitron'; font-size:64px; font-weight:900; color:#fff; text-shadow: 0 0 30px var(--s);}
    .node-status-grid{display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:15px; margin-top:30px;}
    .node-pill{border:1px solid rgba(255,255,255,0.1); padding:10px; font-size:9px; text-align:center; background:rgba(255,255,255,0.02);}
    .node-pill span{display:block; color:var(--p); font-weight:800; margin-top:5px;}</style></head><body><canvas id='c'></canvas>
    <div class='singularity-hud'>
        <div class='main-panel' style='width:700px; margin:auto;'>
            <div class='potential-header'>ECOSYSTEM_POTENTIAL_V350</div>
            <div class='potential-value' id='potential-val'>0.00%</div>
            <div style='font-size:11px; opacity:0.6; margin-top:10px;'>TOTAL_UTILITY_CAPACITY_GENERATED_BY_NETWORK</div>
            <div class='node-status-grid'>
                <div class='node-pill'>CODING_CORE <span id='n1'>SYNCED</span></div>
                <div class='node-pill'>IMAGE_GEN <span id='n2'>SYNCED</span></div>
                <div class='node-pill'>INFRA_THEMES <span id='n3'>SYNCED</span></div>
                <div class='node-pill'>SECURITY_SENTINEL <span id='n4'>SYNCED</span></div>
            </div>
            <div id='status-log' style='font-family:"JetBrains Mono"; font-size:9px; margin-top:30px; opacity:0.4;'>[SYSTEM] Analyzing cross-node handshakes...</div>
        </div>
    </div>
    <script>
    let potential = 0; 
    function evolveSingularity() { 
        potential += Math.random() * 0.5;
        if(potential >= 100) potential = 99.99;
        document.getElementById('potential-val').innerText = potential.toFixed(2) + '%';
        if(potential > 90) document.documentElement.style.setProperty('--s', '#ffd700');
        requestAnimationFrame(evolveSingularity);
    }
    evolveSingularity();
    const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();
    function draw(){t+=0.01;ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--s)';
    for(let i=0; i<12; i++){ctx.beginPath();ctx.arc(w/2, h/2, 50+i*40+Math.sin(t+i)*40, 0, Math.PI*2);ctx.stroke();}requestAnimationFrame(draw);}draw();
    </script></body></html>
