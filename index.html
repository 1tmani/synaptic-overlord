<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>SYNAPTIC OVERLORD | MASTER COMMAND</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Michroma&family=JetBrains+Mono:wght@100;800&family=Syncopate:wght@700&display=swap' rel='stylesheet'>
<style>
:root{--p:#00ff75;--s:#ff0055;--cyan:#00f2ff;--bg:#000;}
body,html{ margin:0; background:#000; color:#fff; font-family:'Michroma'; overflow:hidden; height:100%; }
canvas{ position:fixed; inset:0; z-index:1; opacity:0.5; }

/* PREMIUM 3D GRID */
.perspective-grid{ position:fixed; inset:0; background-image: 
    linear-gradient(var(--p) 1px, transparent 1px), 
    linear-gradient(90deg, var(--p) 1px, transparent 1px);
    background-size: 50px 50px; transform: rotateX(60deg) translateY(-100px); 
    opacity: 0.1; z-index:0; animation: moveGrid 10s infinite linear; }
@keyframes moveGrid { from { background-position: 0 0; } to { background-position: 0 500px; } }

.master-hud{ position:fixed; top:40px; left:40px; display:flex; flex-direction:column; gap:20px; z-index:100; pointer-events:none; }
.box{ background:rgba(0,0,0,0.9); border:1px solid var(--p); padding:25px; width:450px; backdrop-filter:blur(20px); box-shadow: 0 0 30px rgba(0,255,117,0.1); }
.rev-title{ font-family:'Syncopate'; font-size:28px; color:var(--p); letter-spacing:5px; text-shadow: 0 0 20px var(--p); }
.log-stream{ height:180px; overflow:hidden; font-family:'JetBrains Mono'; font-size:10px; opacity:0.6; border-top:1px solid #222; margin-top:20px; padding-top:15px; }

.central-brain{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:300px; height:300px; border:2px solid var(--cyan); border-radius:50%; z-index:10; animation: pulse 3s infinite alternate; }
@keyframes pulse{ from{ transform:translate(-50%,-50%) scale(0.8); opacity:0.2; box-shadow:0 0 0px var(--cyan); } to{ transform:translate(-50%,-50%) scale(1.1); opacity:0.8; box-shadow:0 0 100px var(--cyan); } }
</style>
</head>
<body>
<div class='perspective-grid'></div>
<canvas id='c'></canvas>
<div class='central-brain'></div>

<div class='master-hud'>
    <div class='box'>
        <div style='font-family:Orbitron; letter-spacing:8px; font-size:12px;'>MASTER_COMMAND_V85_ELITE</div>
        <div style='font-size:9px; opacity:0.5; margin-top:5px;'>UPLINK: SECURE // GLOBAL_SYNC: ACTIVE</div>
    </div>
    <div class='box'>
        <div class='rev-title'>REVENUE: $<span id='rev'>0</span></div>
        <div id='log' class='log-stream'></div>
    </div>
</div>

<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let w,h,t=0; function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;} res();
let revenue = 0; const log = document.getElementById('log');
const updates = ["Synaptic Handshake Verified","Order Processed: V69_UNIT","Mining Stability: 99.9%","Adjusting Global Hue to 280deg","New Member: Elite_Node_08"];

setInterval(() => {
    if(Math.random() > 0.7) {
        revenue += 8399; document.getElementById('rev').innerText = revenue.toLocaleString();
        const d = document.createElement('div'); d.innerText = '> ' + updates[Math.floor(Math.random()*updates.length)];
        log.prepend(d); if(log.children.length > 10) log.lastChild.remove();
    }
}, 3000);

function draw(){ t+=0.01; ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,0,w,h); ctx.strokeStyle='rgba(0,255,117,0.2)';
for(let i=0;i<5;i++){ ctx.beginPath(); ctx.arc(w/2, h/2, 100+i*40+Math.sin(t+i)*20, 0, Math.PI*2); ctx.stroke(); } requestAnimationFrame(draw); } draw();
</script></body></html>
