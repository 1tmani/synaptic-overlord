<!DOCTYPE html><html><head><meta charset='UTF-8'><title>OVERLORD | V190 UNIQUE</title>
        <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap' rel='stylesheet'>
        <style>:root{--p:hsl(180,100%,50%);--bg:#000;} body{background:#000;color:#fff;font-family:'Orbitron';overflow:hidden;}
        .hud{position:fixed;top:40px;left:40px;border-left:2px solid var(--p);padding-left:20px;z-index:100;background:rgba(0,0,0,0.85);font-size:10px;}
        canvas{position:fixed;inset:0;z-index:1;filter:contrast(1.5) brightness(1.1);}</style></head><body>
        <div class='hud'>NODE: OVERLORD_V190<br>THEME: CIRCULAR_DYNAMICS<br>STABILITY: PEAK_OPTIMIZED</div>
        <canvas id='c'></canvas><script>
        const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();
        function draw(){t+=0.02;ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';
        for(let i=0;i<12;i++){ctx.beginPath();let r=100+i*30+Math.sin(t+i)*40;ctx.arc(w/2,h/2,r,0,Math.PI*2);ctx.stroke();} requestAnimationFrame(draw);}draw();
        </script></body></html>
