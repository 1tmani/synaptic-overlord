<!DOCTYPE html><html><head><meta charset='UTF-8'><title>OVERLORD | THINKING ENGINE</title><style>:root{--p:#00ff75;--bg:#000;}body{background:#000;color:#fff;font-family:monospace;overflow:hidden;}.hud{position:fixed;top:40px;left:40px;border-left:4px solid var(--p);padding-left:20px;background:rgba(0,0,0,0.9);}.module{margin-top:20px;padding:15px;border:1px solid #333;width:400px;}.learn-bar{height:2px;background:var(--p);width:0%;transition:1s;}canvas{position:fixed;inset:0;z-index:1;opacity:0.3;}</style></head><body><canvas id='c'></canvas><div class='hud'><div>[SYSTEM] MASTER_THINKING_V180</div><div class='module'><div>LEARNING_CAPACITY: <span id='lp'>0</span>%</div><div class='learn-bar' id='lb'></div></div><div class='module' id='tasks'><div>SOLVING_ACTIVE: TRUE</div><div id='log' style='font-size:9px;opacity:0.5;margin-top:10px;'></div></div></div><script>let p=0;setInterval(()=>{p=(p+1)%101;document.getElementById('lp').innerText=p;document.getElementById('lb').style.width=p+'%';const d=document.createElement('div');d.innerText='> NEURAL_SOLVE: '+Math.random().toString(36).substr(2,8).toUpperCase();const log=document.getElementById('log');log.prepend(d);if(log.children.length>5)log.lastChild.remove();},2000);const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();function draw(){t+=0.01;ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';for(let i=0;i<5;i++){ctx.strokeRect(w/2-i*20,h/2-i*20,i*40,i*40);ctx.rotate(0.001);}requestAnimationFrame(draw);}draw();</script></body></html>
