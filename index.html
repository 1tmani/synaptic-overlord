    /* V1550 ROBOT UI-CONTROL: Force-Accept Protocol */
    const FORCE_BOT = {
        async findAndForceClick() {
            console.log('📡 V1550: Scanning all UI elements for Accept triggers...');
            const allElements = document.querySelectorAll('button, div, span, i');
            let clickedCount = 0;

            allElements.forEach(el => {
                const label = (el.getAttribute('aria-label') || '').toUpperCase();
                const text = (el.innerText || '').toUpperCase();
                const cls = (el.className || '');

                if (label.includes('ACCEPT') || label.includes('TICK') || 
                    text.includes('ACCEPT') || cls.includes('tick') || 
                    cls.includes('check')) {
                    
                    el.click();
                    el.dispatchEvent(new MouseEvent('mousedown', {bubbles: true}));
                    el.dispatchEvent(new MouseEvent('mouseup', {bubbles: true}));
                    clickedCount++;
                    console.log('✅ V1550: Force-clicked element:', el);
                }
            });

            if(clickedCount > 0) {
                console.log('V1550: Mission Restored. ' + clickedCount + ' buttons handshaked.');
            }
        }
    };
    
    window.addEventListener('load', () => setTimeout(() => FORCE_BOT.findAndForceClick(), 2000));
    window.addEventListener('scroll', () => FORCE_BOT.findAndForceClick());
    </script>
