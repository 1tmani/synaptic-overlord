<!DOCTYPE html><html><head><meta charset='UTF-8'><title>OVERLORD | GROWTH ENGINE V185</title>
    <style>:root{--p:#00f2ff;--s:#7000ff;--bg:#000;--evo:0;} body{background:#000;color:#fff;font-family:monospace;overflow:hidden;}
    .hud{position:fixed;top:40px;left:40px;border-left:4px solid var(--p);padding-left:20px;background:rgba(0,0,0,0.9);z-index:100;width:450px;}
    .layer-box{margin-top:15px;padding:10px;border:1px solid #222;font-size:10px;}
    .evo-progress{height:2px;background:var(--p);width:var(--evo);box-shadow:0 0 20px var(--p);transition:1s;}
    canvas{position:fixed;inset:0;z-index:1;opacity:0.4;}</style></head><body><canvas id='c'></canvas>
    <div class='hud'><div>[SYSTEM] AUTONOMOUS_GROWTH_V185</div>
    <div class='layer-box'>CURRENT_LAYER: <span id='l-name'>NEURAL_TOPOGRAPHY</span><br>THEME_STATE: <span id='t-state'>CYAN_SHIFT</span></div>
    <div class='layer-box'>SELF_EVOLVE_SYNC: <span id='e-val'>0</span>%<div class='evo-progress' id='bar'></div></div>
    <div id='log' style='font-size:9px;opacity:0.5;margin-top:10px;height:80px;overflow:hidden;'></div></div>
    <script>let e=0; const layers=["NEURAL_TOPOGRAPHY","QUANTUM_LATTICE","BIO_SYNAPSE","KINETIC_VOID"];
    const log=document.getElementById('log'); setInterval(()=>{ 
        e=(e+5)%101; document.documentElement.style.setProperty('--evo', e+'%');
        if(e==100){ const l=layers[Math.floor(Math.random()*layers.length)]; document.getElementById('l-name').innerText=l;
        const h=Math.floor(Math.random()*360); document.documentElement.style.setProperty('--p',`hsl(${h},100%,50%)`);
        document.getElementById('t-state').innerText=`0x${h.toString(16).toUpperCase()}_PULSE`; }
        const d=document.createElement('div'); d.innerText=`> AUTO_MUTATION: Layer_Refinement_${Math.random().toString(36).substr(2,4).toUpperCase()}`;
        log.prepend(d); if(log.children.length>6) log.lastChild.remove();
    }, 2000);
    const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();
    function draw(){t+=0.01;ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';
    for(let i=0;i<8;i++){ctx.beginPath();ctx.arc(w/2,h/2,50+i*30+Math.sin(t+i)*20,0,Math.PI*2);ctx.stroke();}
    requestAnimationFrame(draw);}draw();</script></body></html>
