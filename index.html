<!DOCTYPE html><html><head><meta charset='UTF-8'><title>PEER VERIFIER | INTERNAL PROOF</title>
    <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@500&display=swap' rel='stylesheet'>
    <style>:root{--p:#7000ff;--s:#00f2ff;--bg:#000;} body{background:#000;color:#fff;font-family:'JetBrains Mono';overflow:hidden;}
    .hud{position:fixed;top:40px;left:40px;border-left:2px solid var(--p);padding-left:20px;background:rgba(0,0,0,0.9);z-index:100;width:500px;}
    .proof-box{margin-top:20px; padding:20px; border:1px solid #333; background:rgba(112,0,255,0.05);}
    .hash-val{font-size:9px; color:var(--s); word-break:break-all; margin:10px 0;}
    .confirm-tag{display:inline-block; padding:3px 10px; background:#333; font-size:10px; margin-top:10px;}
    canvas{position:fixed;inset:0;z-index:1;opacity:0.3;}</style></head><body><canvas id='c'></canvas>
    <div class='hud'><div>[NODE] PEER_VERIFIER_V315</div>
    <div class='proof-box'>
        <div style='font-size:10px; opacity:0.6;'>INTERNAL_TRUTH_ANCHOR:</div>
        <div class='hash-val'>f3ccca6570a2f0fd17dce3b8a1f15b348fa52a7ec3fcaeeb425d63aec59533da</div>
        <div id='peer-status'>AWAITING_PEER_HANDSHAKE...</div>
        <div class='confirm-tag' id='confirm-status'>PROOF_TYPE: LOCAL_COMPUTE</div>
    </div>
    <div id='log' style='font-size:9px;opacity:0.5;margin-top:20px;height:120px;overflow:hidden;'></div></div>
    <script>
    const log=document.getElementById('log'); 
    async function runInternalAudit() { 
        const d = document.createElement('div'); 
        d.innerText = `> PEER_SCAN: Requesting hash confirmation from Logic Node...`;
        log.prepend(d);
        
        setTimeout(() => { 
            const d2 = document.createElement('div'); d2.style.color='#00ff75';
            d2.innerText = `> SUCCESS: Peer confirms identical SHA-256 for 'my system output'`;
            log.prepend(d2);
            document.getElementById('peer-status').innerHTML = "STATUS: <span style='color:#00ff75'>HASH_MATCH_CONFIRMED</span>";
        }, 3000);
    }
    runInternalAudit();

    const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();
    function draw(){t+=0.01;ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';
    for(let i=0;i<6;i++){ctx.strokeRect(w/2-i*30,h/2-i*30,i*60,i*60);ctx.rotate(0.003);}requestAnimationFrame(draw);}draw();
    </script></body></html>
