<!DOCTYPE html><html><head><meta charset='UTF-8'><title>OVERLORD | LOGIC DISPATCHER V310</title>
    <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@500&display=swap' rel='stylesheet'>
    <style>:root{--p:#ff0055;--s:#00f2ff;--bg:#000;} body{background:#000;color:#fff;font-family:'JetBrains Mono';overflow:hidden;}
    .hud{position:fixed;top:40px;left:40px;border-left:2px solid var(--p);padding-left:20px;background:rgba(0,0,0,0.9);z-index:100;width:450px;}
    .dispatch-status{margin-top:20px;padding:15px;border:1px solid #333;font-size:11px;}
    .gas-ticker{font-family:'Orbitron'; font-size:24px; color:var(--s);}
    canvas{position:fixed;inset:0;z-index:1;opacity:0.4;}</style></head><body><canvas id='c'></canvas>
    <div class='hud'><div>[SYSTEM] MASTER_DISPATCH_V310</div>
    <div class='dispatch-status'>ACTIVE_NODE_CLUSTER: <span id='cluster'>SYNCHRONIZING</span><br>GAS_CONSUMPTION: <span class='gas-ticker' id='gas'>0.0000</span> $SBY</div>
    <div id='log' style='font-size:9px;opacity:0.5;margin-top:15px;height:120px;overflow:hidden;'></div></div>
    <script>
    const log=document.getElementById('log'); let gas=0;
    const nodes=['auto-liquid-infra-318', 'auto-liquid-intelligence-875', 'data-sentinel'];
    
    function dispatchTask() { 
        const target = nodes[Math.floor(Math.random() * nodes.length)];
        gas += 0.0005; document.getElementById('gas').innerText = gas.toFixed(4);
        document.getElementById('cluster').innerText = target.toUpperCase();
        const d = document.createElement('div'); d.innerText = `> DISPATCH: Fragmenting Logic for ${target}...`;
        log.prepend(d); if(log.children.length > 8) log.lastChild.remove();
    }
    setInterval(dispatchTask, 4000);

    const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();
    function draw(){t+=0.01;ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';
    for(let i=0;i<8;i++){ctx.beginPath();ctx.arc(w/2,h/2,100+i*30+Math.sin(t+i)*20,0,Math.PI*2);ctx.stroke();}requestAnimationFrame(draw);}draw();
    </script></body></html>
